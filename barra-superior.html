<style>
    /* ── Offset para o conteúdo não ficar escondido ── */
    body {
        padding-top: 90px !important;
        margin: 0;
    }

    /* ── BARRA PRINCIPAL ── */
    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: #ffffff;
        box-shadow: 0 1px 0 rgba(212,175,55,.25), 0 4px 20px rgba(0,0,0,.06);
        font-family: 'Inter', system-ui, sans-serif;
    }

    /* Linha dourada muito fina no topo */
    .top-bar::before {
        content: '';
        display: block;
        height: 3px;
        background: linear-gradient(90deg, transparent 0%, #d4af37 30%, #f5e6a3 60%, #d4af37 80%, transparent 100%);
    }

    .header-content {
        width: 100%;
        max-width: 1300px;
        margin: 0 auto;
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        box-sizing: border-box;
    }

    /* ── LOGO ── */
    .brand {
        display: flex;
        align-items: center;
        text-decoration: none;
        flex-shrink: 0;
    }

    .nav-logo {
        height: 52px;
        width: auto;
        display: block;
        /* Filtro para imagem branca/cinza — remove se a logo já é escura */
        filter: none;
        transition: opacity 0.25s;
    }

    .brand:hover .nav-logo {
        opacity: 0.8;
    }

    /* ── SEPARADOR VERTICAL ── */
    .nav-divider {
        width: 1px;
        height: 28px;
        background: #e0d5c1;
        margin: 0 24px 0 32px;
        flex-shrink: 0;
    }

    /* ── LINKS DE NAVEGAÇÃO ── */
    .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
    }

    .nav-links a {
        text-decoration: none;
        color: #555;
        font-size: 0.82rem;
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 6px 12px;
        border-radius: 4px;
        position: relative;
        transition: color 0.25s, background 0.25s;
        white-space: nowrap;
    }

    .nav-links a:hover {
        color: #d4af37;
        background: rgba(212,175,55,.07);
    }

    /* Sublinhado dourado ao passar */
    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 12px;
        right: 12px;
        height: 1.5px;
        background: #d4af37;
        transform: scaleX(0);
        transform-origin: center;
        transition: transform 0.25s ease;
        border-radius: 1px;
    }

    .nav-links a:hover::after,
    .active-link::after {
        transform: scaleX(1) !important;
    }

    /* Link activo */
    .active-link {
        color: #d4af37 !important;
        font-weight: bold;
    }

    /* ── SEPARADOR ANTES DOS LINKS ADMIN ── */
    .nav-admin-sep {
        width: 1px;
        height: 18px;
        background: #ddd;
        margin: 0 6px;
        flex-shrink: 0;
    }

    /* Destaque especial para "+ Novo Pedido" */
    .nav-links a.link-novo {
        background: #1a1a2e;
        color: #d4af37 !important;
        border-radius: 20px;
        padding: 6px 16px;
        letter-spacing: 0.6px;
        font-size: 0.8rem;
    }

    .nav-links a.link-novo:hover {
        background: #2e2e4e;
    }

    .nav-links a.link-novo::after {
        display: none;
    }

    /* ── LADO DIREITO: SAIR ── */
    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        margin-left: 16px;
    }

    .btn-logout {
        background: transparent;
        color: #999;
        border: 1px solid #ddd;
        padding: 7px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        transition: all 0.25s;
        margin: 0 !important;
    }

    .btn-logout:hover {
        border-color: #c62828;
        color: #c62828;
        background: rgba(198,40,40,.05);
    }

    /* ── DROPDOWN GESTÃO ── */
    .nav-dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
    }
    .nav-dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background-color: #ffffff;
        min-width: 170px;
        box-shadow: 0 10px 25px rgba(0,0,0,.1);
        z-index: 1001;
        border-radius: 8px;
        padding: 8px 0;
        margin-top: 5px;
        border: 1px solid #eee;
    }
    
    /* ── PERFIL DROPDOWN ── */
    .nav-profile {
        position: relative;
        flex-shrink: 0;
    }
    .nav-profile-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px 8px;
        border-radius: 10px;
        transition: background 0.2s;
        font-family: inherit;
    }
    .nav-profile-btn:hover { background: rgba(212,175,55,.08); }
    .nav-profile-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #d4af37, #b8860b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        border: 2px solid rgba(212,175,55,.3);
    }
    .nav-profile-name {
        font-size: 0.82rem;
        font-weight: 600;
        color: #333;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .nav-profile-role {
        font-size: 0.7rem;
        color: #aaa;
        font-weight: 400;
    }
    .nav-profile-chevron {
        font-size: 0.55rem;
        color: #aaa;
        transition: transform 0.2s;
    }
    .nav-profile.aberto .nav-profile-chevron { transform: rotate(180deg); }
    .nav-profile-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0,0,0,.13);
        border: 1px solid #ede9e3;
        min-width: 200px;
        z-index: 2000;
        overflow: hidden;
        animation: fadeIn 0.15s ease-out;
    }
    .nav-profile.aberto .nav-profile-dropdown { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .profile-dd-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #f0ece5;
    }
    .profile-dd-email {
        font-size: 0.78rem;
        color: #aaa;
        margin-top: 2px;
        word-break: break-all;
    }
    .profile-dd-name {
        font-size: 0.92rem;
        font-weight: 700;
        color: #1a1a2e;
    }
    .profile-dd-badge {
        display: inline-block;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        margin-top: 4px;
        background: #fef9e7;
        color: #b8860b;
        border: 1px solid #f5e6a3;
    }
    .profile-dd-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 16px;
        font-size: 0.85rem;
        font-weight: 500;
        color: #444;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        border: none;
        background: none;
        width: 100%;
        font-family: inherit;
    }
    .profile-dd-item:hover { background: #faf9f7; }
    .profile-dd-item.danger { color: #c62828; }
    .profile-dd-item.danger:hover { background: #fdecea; }
    .profile-dd-sep { height: 1px; background: #f0ece5; margin: 2px 0; }
    .nav-dropdown:hover .nav-dropdown-content,
    .nav-dropdown-content.aberto {
        display: block;
        animation: fadeIn 0.2s ease-out;
    }
    .nav-dropdown-content a {
        color: #555 !important;
        padding: 10px 16px !important;
        text-decoration: none;
        display: block;
        font-size: 0.78rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        border-radius: 0 !important;
        white-space: normal;
        text-align: center;
        background: transparent !important;
    }
    .nav-dropdown-content a:hover {
        background-color: rgba(212,175,55,.05) !important;
        color: #d4af37 !important;
    }
    .nav-dropdown-content a::after {
        display: none !important;
    }
    .dropdown-icon {
        font-size: 0.6rem;
        transition: transform 0.2s;
        margin-left: 3px;
        color: inherit;
    }
    .nav-dropdown:hover .dropdown-icon,
    .nav-dropdown.aberto .dropdown-icon {
        transform: rotate(180deg);
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 960px) {
        .nav-links a { font-size: 0.75rem; padding: 5px 8px; }
        .nav-divider  { margin: 0 12px 0 20px; }
        .header-content { padding: 0 16px; }
    }

    @media (max-width: 768px) {
        .nav-admin-sep { display: none; }
        .nav-links { gap: 2px; }
        .nav-links a { font-size: 0.7rem; padding: 5px 6px; letter-spacing: 0; }
        body { padding-top: 80px !important; }
    }
</style>
