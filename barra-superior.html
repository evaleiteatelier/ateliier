<style>
    /* ── Offset para o conteúdo não ficar escondido ── */
    body {
        padding-top: 90px !important;
        margin: 0;
    }

    /* ── BARRA PRINCIPAL ── */
    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: #ffffff;
        box-shadow: 0 1px 0 rgba(212,175,55,.25), 0 4px 20px rgba(0,0,0,.06);
        font-family: 'Inter', system-ui, sans-serif;
    }

    /* Linha dourada muito fina no topo */
    .top-bar::before {
        content: '';
        display: block;
        height: 3px;
        background: linear-gradient(90deg, transparent 0%, #d4af37 30%, #f5e6a3 60%, #d4af37 80%, transparent 100%);
    }

    .header-content {
        width: 100%;
        max-width: 1300px;
        margin: 0 auto;
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        box-sizing: border-box;
    }

    /* ── LOGO ── */
    .brand {
        display: flex;
        align-items: center;
        text-decoration: none;
        flex-shrink: 0;
    }

    .nav-logo {
        height: 52px;
        width: auto;
        display: block;
        /* Filtro para imagem branca/cinza — remove se a logo já é escura */
        filter: none;
        transition: opacity 0.25s;
    }

    .brand:hover .nav-logo {
        opacity: 0.8;
    }

    /* ── SEPARADOR VERTICAL ── */
    .nav-divider {
        width: 1px;
        height: 28px;
        background: #e0d5c1;
        margin: 0 24px 0 32px;
        flex-shrink: 0;
    }

    /* ── LINKS DE NAVEGAÇÃO ── */
    .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
    }

    .nav-links a {
        text-decoration: none;
        color: #555;
        font-size: 0.82rem;
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 6px 12px;
        border-radius: 4px;
        position: relative;
        transition: color 0.25s, background 0.25s;
        white-space: nowrap;
    }

    .nav-links a:hover {
        color: #d4af37;
        background: rgba(212,175,55,.07);
    }

    /* Sublinhado dourado ao passar */
    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 12px;
        right: 12px;
        height: 1.5px;
        background: #d4af37;
        transform: scaleX(0);
        transform-origin: center;
        transition: transform 0.25s ease;
        border-radius: 1px;
    }

    .nav-links a:hover::after,
    .active-link::after {
        transform: scaleX(1) !important;
    }

    /* Link activo */
    .active-link {
        color: #d4af37 !important;
        font-weight: bold;
    }

    /* ── SEPARADOR ANTES DOS LINKS ADMIN ── */
    .nav-admin-sep {
        width: 1px;
        height: 18px;
        background: #ddd;
        margin: 0 6px;
        flex-shrink: 0;
    }

    /* Destaque especial para "+ Novo Pedido" */
    .nav-links a.link-novo {
        background: #1a1a2e;
        color: #d4af37 !important;
        border-radius: 20px;
        padding: 6px 16px;
        letter-spacing: 0.6px;
        font-size: 0.8rem;
    }

    .nav-links a.link-novo:hover {
        background: #2e2e4e;
    }

    .nav-links a.link-novo::after {
        display: none;
    }

    /* ── LADO DIREITO: SAIR ── */
    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        margin-left: 16px;
    }

    .btn-logout {
        background: transparent;
        color: #999;
        border: 1px solid #ddd;
        padding: 7px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        transition: all 0.25s;
        margin: 0 !important;
    }

    .btn-logout:hover {
        border-color: #c62828;
        color: #c62828;
        background: rgba(198,40,40,.05);
    }

    /* ── DROPDOWN GESTÃO ── */
    .nav-dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
    }
    .nav-dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background-color: #ffffff;
        min-width: 170px;
        box-shadow: 0 10px 25px rgba(0,0,0,.1);
        z-index: 1001;
        border-radius: 8px;
        padding: 8px 0;
        margin-top: 5px;
        border: 1px solid #eee;
    }
    .nav-dropdown:hover .nav-dropdown-content,
    .nav-dropdown-content.aberto {
        display: block;
        animation: fadeIn 0.2s ease-out;
    }
    .nav-dropdown-content a {
        color: #555 !important;
        padding: 10px 16px !important;
        text-decoration: none;
        display: block;
        font-size: 0.78rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        border-radius: 0 !important;
        white-space: normal;
        text-align: center;
        background: transparent !important;
    }
    .nav-dropdown-content a:hover {
        background-color: rgba(212,175,55,.05) !important;
        color: #d4af37 !important;
    }
    .nav-dropdown-content a::after {
        display: none !important;
    }
    .dropdown-icon {
        font-size: 0.6rem;
        transition: transform 0.2s;
        margin-left: 3px;
        color: inherit;
    }
    .nav-dropdown:hover .dropdown-icon,
    .nav-dropdown.aberto .dropdown-icon {
        transform: rotate(180deg);
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 960px) {
        .nav-links a { font-size: 0.75rem; padding: 5px 8px; }
        .nav-divider  { margin: 0 12px 0 20px; }
        .header-content { padding: 0 16px; }
    }

    @media (max-width: 768px) {
        .nav-admin-sep { display: none; }
        .nav-links { gap: 2px; }
        .nav-links a { font-size: 0.7rem; padding: 5px 6px; letter-spacing: 0; }
        body { padding-top: 80px !important; }
    }
</style>

                <div class="nav-dropdown" id="nav-dropdown-admin">

                        <a href="contas.html" data-page="contas.html" class="full-admin-only">Contas</a>
                        <a href="financas.html"   data-page="financas.html">Finanças</a>
                        <a href="utilizadores.html" data-page="utilizadores.html">Utilizadores</a>
                    </div>
                </div>
            </span>
        </nav>

        <!-- BOTÃO SAIR -->
        <div class="nav-right admin-only-group">

        </div>

    </div>
</header>
