<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Lista de Espera - Eva Leite Atelier</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>

  <h1>Lista de Espera</h1>
  
  <div style="max-width: 600px; margin: 0 auto 20px auto;">
    <label for="pesquisa">Pesquisar Cliente:</label>
    <input type="text" id="pesquisa" placeholder="Digite o nome da cliente..." onkeyup="filtrarPedidos()">
  </div>

  <div id="lista-espera">
    <p>A carregar lista...</p>
  </div>

  <div id="modal-editar" class="modal-overlay" style="display:none;">
  <div class="modal-conteudo">
    <h2>Editar Pedido</h2>
    <div id="itens-editar"></div>
    
    <div style="margin-top: 15px; padding:10px; background:#f9f9f9; border-radius:6px; border:1px solid #eee;">
      <label style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">🎟️ Aplicar Cupão de Desconto</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="editor-cupao-busca" placeholder="Código ou nome da cliente..." style="flex:1; width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
        <button type="button" onclick="verificarCupaoEditor()" style="background:#d4af37; color:#000; font-weight:bold; border:none; border-radius:4px; padding:0 15px; cursor:pointer;">Verificar</button>
      </div>
      <div id="editor-cupao-resultado" style="margin-top:8px; font-size:0.85rem; display:none;"></div>
      <input type="hidden" id="editor-cupao-id" value="">
      <input type="hidden" id="editor-cupao-codigo" value="">
      <input type="hidden" id="editor-cupao-desconto" value="">
    </div>

    <div style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
      <p><strong>Preço original:</strong> €<span id="preco-antigo"></span></p>
      <p><strong>Novo preço final:</strong> €<span id="preco-novo"></span></p>
      <p><strong>Diferença:</strong> €<span id="diferenca"></span></p>
    </div>

    <!-- SECÇÃO DE ADIANTAMENTO -->
    <div style="background:#f4f9f4; border:2px dashed #a5d6a7; border-radius:8px; padding:14px; margin-top:15px;">
      <label style="display:block; font-weight:bold; font-size:0.9rem; margin-bottom:8px; color:#2e7d32; margin-top:0;">
        💶 Valor Já Pago (Adiantamento)
      </label>
      <input type="number" id="editor-valor-adiantado" placeholder="Ex: 50.00" step="0.01" min="0"
        style="width:100%; padding:8px; border:1px solid #a5d6a7; border-radius:5px; font-size:1rem; box-sizing:border-box;">
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px; padding-bottom: 10px;">
      <button id="salvar-edicao" style="flex:1; background-color: #4CAF50; color: white; padding: 10px; border:none; border-radius:4px; cursor:pointer;">Salvar Alterações</button>
      <button id="fechar-edicao" style="flex:1; background-color: #f44336; color: white; padding: 10px; border:none; border-radius:4px; cursor:pointer;">Cancelar</button>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <script src="email-notification.js"></script>
  <script src="vouchers.js"></script>
  <script src="navbar.js"></script>
  <script src="script.js"></script> 

</body>
</html>
