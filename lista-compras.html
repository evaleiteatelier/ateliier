<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras - Eva Leite Atelier</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="auth-guard.js"></script>
    <script src="navbar.js" defer></script>

    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a2e;
            --bg: #f5f1ea;
            --text: #2d2d2d;
            --text-muted: #888;
            --radius: 14px;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .wrapper { max-width: 1000px; margin: 30px auto; padding: 0 20px 60px; }
        
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
        .page-header h1 { margin: 0; font-size: 1.8rem; color: var(--dark); }
        .page-header p { margin: 4px 0 0; color: var(--text-muted); font-size: 0.88rem; }

        .btn-gold {
            background: var(--gold); color: #fff; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s; font-family: inherit;
        }
        .btn-gold:hover { background: #b8972e; }

        .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.06); margin-bottom: 30px; }
        .card h2 { margin: 0 0 16px 0; font-size: 1.15rem; color: var(--dark); }

        .card-concluidos { background: #faf9f6; border: 1px dashed #e0dbd0; box-shadow: none; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tbody td { padding: 14px 12px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        
        .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.9rem; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 700; display: inline-block; }
        .badge-alta { background: #fce8e6; color: #c62828; }
        .badge-media { background: #fff3cd; color: #8a6100; }
        .badge-baixa { background: #e8f5e9; color: #2e7d32; }

        .valor-txt { font-size: 0.82rem; color: #666; margin-top: 4px; display: block; }
        
        .acoes { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
        .btn-icon {
            width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.05rem; transition: all 0.2s; background: #f5f5f5; color: #555; text-decoration: none;
        }
        .btn-icon:hover { background: #e0e0e0; }
        
        .btn-link { background: #e3f0ff; color: #1565c0; }
        .btn-link:hover { background: #bbdefb; }
        
        .btn-check { background: #e8f5e9; color: #2e7d32; }
        .btn-check:hover { background: #c8e6c9; }
        
        .btn-del { background: #fce8e6; color: #c62828; }
        .btn-del:hover { background: #ffcdd2; }

        .item-riscado { text-decoration: line-through; color: #999; }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.55);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn .2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-card {
            background: #fff; width: 100%; max-width: 440px; border-radius: var(--radius);
            padding: 28px 24px; box-shadow: 0 10px 40px rgba(0,0,0,.2); animation: slideUp .25s;
        }
        @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 20px; color: var(--dark); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 12px; border: 1.5px solid #e0dbd0; border-radius: 8px;
            font-size: 0.93rem; font-family: inherit; outline: none; box-sizing: border-box; transition: border .2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
        .btn-cancel { background: #f0f0f0; color: #666; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; }
        .btn-cancel:hover { background: #e0e0e0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="page-header">
        <div>
            <h1>🛒 Lista de Compras</h1>
            <p>Gerencie itens a adquirir para o Atelier</p>
        </div>
        <button class="btn-gold" onclick="abrirModal()">+ Novo Item</button>
    </div>

    <!-- PENDENTES -->
    <div class="card">
        <h2>A Comprar</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Prazo Máximo</th>
                    <th>Prioridade</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tbody-pendentes">
                <tr><td colspan="4" class="empty">A carregar...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- CONCLUÍDOS -->
    <div class="card card-concluidos">
        <h2 style="font-size: 1rem; color: #888;">Histórico (Últimos 15 dias)</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Data Compra</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tbody-concluidos">
                <tr><td colspan="3" class="empty">Nenhum histórico recente.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL NOVO ITEM -->
<div class="modal-overlay" id="modal-compras" onclick="fecharModalFora(event)">
    <div class="modal-card">
        <h3 class="modal-title">Adicionar à Lista</h3>
        
        <div class="form-group">
            <label>O que é? *</label>
            <input type="text" id="item-nome" placeholder="Ex: Bobinas de linha branca">
        </div>
        
        <div class="form-group">
            <label>Link (Opcional)</label>
            <input type="url" id="item-link" placeholder="Ex: https://loja.com/produto">
        </div>

        <div class="form-group">
            <label>Valor Estimado / Intervalo (Opcional)</label>
            <input type="text" id="item-valor" placeholder="Ex: 10€ - 15€">
        </div>
        
        <div class="form-group">
            <label>Prioridade</label>
            <select id="item-prioridade">
                <option value="baixa">Baixa</option>
                <option value="media" selected>Média</option>
                <option value="maxima">Máxima</option>
            </select>
        </div>

        <div class="form-group">
            <label>Prazo Máximo (Opcional)</label>
            <input type="date" id="item-prazo">
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-gold" id="btn-guardar" onclick="salvarItem()">Adicionar</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://cixjmwfkfmeedajpmzmp.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpeGptd2ZrZm1lZWRhanBtem1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM1MzM5ODIsImV4cCI6MjA2OTEwOTk4Mn0.vFvgRMK_oabG19FNauNaBu_CoQTL8QRSXcptyfY6rbM";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.addEventListener("DOMContentLoaded", () => {
        // Corre a limpeza automática em background (invisível)
        db.rpc('limpar_compras_antigas').then(() => console.log('Limpeza OK')).catch(e => console.error('Limpeza ERRO', e));
        
        carregarCompras();
    });

    function formatarData(dataIso) {
        if (!dataIso) return '-';
        const d = new Date(dataIso);
        return d.toLocaleDateString('pt-PT');
    }

    async function carregarCompras() {
        const tbPendentes = document.getElementById('tbody-pendentes');
        const tbConcluidos = document.getElementById('tbody-concluidos');
        
        tbPendentes.innerHTML = `<tr><td colspan="4" class="empty"><div class="spinner" style="margin:0 auto;"></div></td></tr>`;
        
        const { data, error } = await db.from('compras').select('*').order('created_at', { ascending: false });

        if (error) {
            tbPendentes.innerHTML = `<tr><td colspan="4" class="empty" style="color:red">Erro: ${error.message}</td></tr>`;
            return;
        }

        const pendentes = data.filter(i => i.status === 'pendente');
        const concluidos = data.filter(i => i.status === 'concluido');

        // PENDENTES
        if (pendentes.length === 0) {
            tbPendentes.innerHTML = `<tr><td colspan="4" class="empty">Não há itens a comprar neste momento! 🎉</td></tr>`;
        } else {
            tbPendentes.innerHTML = pendentes.map(item => {
                let badgeClass = 'badge-media';
                let badgeText = 'Média';
                if (item.prioridade === 'baixa') { badgeClass = 'badge-baixa'; badgeText = 'Baixa'; }
                if (item.prioridade === 'maxima') { badgeClass = 'badge-alta'; badgeText = 'Máxima'; }

                let linkBtn = item.link ? `<a href="${item.link}" target="_blank" class="btn-icon btn-link" title="Abrir link">&#128279;</a>` : '';
                let valorHtml = item.valor_estimado ? `<span class="valor-txt">💰 ${item.valor_estimado}</span>` : '';

                return `
                <tr>
                    <td>
                        <strong style="color: #1a1a2e">${item.nome}</strong>
                        ${valorHtml}
                    </td>
                    <td>${item.prazo_maximo ? formatarData(item.prazo_maximo) : '-'}</td>
                    <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                    <td>
                        <div class="acoes">
                            ${linkBtn}
                            <button class="btn-icon btn-check" title="Marcar como Comprado" onclick="marcarComprado('${item.id}')">&#10004;</button>
                            <button class="btn-icon btn-del" title="Apagar" onclick="apagarItem('${item.id}')">&#128465;</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // CONCLUÍDOS
        if (concluidos.length === 0) {
            tbConcluidos.innerHTML = `<tr><td colspan="3" class="empty">Nenhum histórico recente.</td></tr>`;
        } else {
            tbConcluidos.innerHTML = concluidos.map(item => {
                let valorHtml = item.valor_estimado ? `<span class="valor-txt">💰 ${item.valor_estimado}</span>` : '';
                return `
                <tr>
                    <td class="item-riscado">
                        <strong>${item.nome}</strong>
                        ${valorHtml}
                    </td>
                    <td style="color:#888; font-size:0.85rem;">${formatarData(item.data_conclusao)}</td>
                    <td>
                        <div class="acoes">
                            <button class="btn-icon btn-del" title="Apagar" onclick="apagarItem('${item.id}')">&#128465;</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }
    }

    function abrirModal() {
        document.getElementById('item-nome').value = '';
        document.getElementById('item-link').value = '';
        document.getElementById('item-valor').value = '';
        document.getElementById('item-prioridade').value = 'media';
        document.getElementById('item-prazo').value = '';
        document.getElementById('modal-compras').classList.add('active');
    }

    function fecharModal() {
        document.getElementById('modal-compras').classList.remove('active');
    }

    function fecharModalFora(e) {
        if (e.target.id === 'modal-compras') fecharModal();
    }

    async function salvarItem() {
        const nome = document.getElementById('item-nome').value.trim();
        const link = document.getElementById('item-link').value.trim();
        const valor = document.getElementById('item-valor').value.trim();
        const prioridade = document.getElementById('item-prioridade').value;
        const prazo = document.getElementById('item-prazo').value || null;

        if (!nome) {
            window.mostrarAviso?.("O nome do item é obrigatório.", "Atenção", "⚠️") || alert("O nome do item é obrigatório.");
            return;
        }

        const btn = document.getElementById('btn-guardar');
        btn.disabled = true;
        btn.textContent = 'A guardar...';

        const { error } = await db.from('compras').insert([{
            nome,
            link: link || null,
            valor_estimado: valor || null,
            prioridade,
            prazo_maximo: prazo
        }]);

        btn.disabled = false;
        btn.textContent = 'Adicionar';

        if (error) {
            console.error(error);
            window.mostrarAviso?.("Erro ao salvar: " + error.message, "Erro", "❌") || alert("Erro: " + error.message);
            return;
        }

        fecharModal();
        carregarCompras();
    }

    async function marcarComprado(id) {
        const confirmar = window.mostrarConfirmacao 
            ? await window.mostrarConfirmacao("Marcar este item como já comprado?", "Comprado", "✅", "Sim", "Cancelar")
            : confirm("Marcar este item como comprado?");
            
        if (!confirmar) return;

        const { error } = await db.from('compras').update({
            status: 'concluido',
            data_conclusao: new Date().toISOString()
        }).eq('id', id);

        if (error) {
            window.mostrarAviso?.("Erro ao atualizar: " + error.message, "Erro", "❌") || alert("Erro: " + error.message);
        } else {
            carregarCompras();
        }
    }

    async function apagarItem(id) {
        const confirmar = window.mostrarConfirmacao 
            ? await window.mostrarConfirmacao("Tem a certeza que deseja apagar este item?", "Apagar", "🗑️", "Apagar", "Cancelar")
            : confirm("Tem a certeza que deseja apagar?");
            
        if (!confirmar) return;

        const { error } = await db.from('compras').delete().eq('id', id);

        if (error) {
            window.mostrarAviso?.("Erro ao apagar: " + error.message, "Erro", "❌") || alert("Erro: " + error.message);
        } else {
            carregarCompras();
        }
    }
</script>

</body>
</html>
